sensor:
  - name: "Plac temperatura"
    object_id: "plac.temp"
    state_topic: "home/temp-dust-sensor"
    value_template: "{{ value_json.temperature | round(1) }}"
    unit_of_measurement: "°C"
  - name: "Plac wilgotność"
    object_id: "plac.humidity"
    icon: "mdi:water-percent"
    state_topic: "home/temp-dust-sensor"
    value_template: "{{ value_json.humidity | round(1) }}"
    unit_of_measurement: "%"
  - name: "Plac PM 1.0"
    object_id: "plac.pm10"
    state_topic: "home/temp-dust-sensor"
    value_template: "{{ value_json.pm1_0 | round(0) }}"
    unit_of_measurement: "µg/m3"
  - name: "Plac PM 2.5"
    object_id: "plac.pm25"
    state_topic: "home/temp-dust-sensor"
    value_template: "{{ value_json.pm2_5 | round(0) }}"
    unit_of_measurement: "µg/m3"
  - name: "Plac PM 10.0"
    object_id: "plac.pm100"
    state_topic: "home/temp-dust-sensor"
    value_template: "{{ value_json.pm10_0 | round(0) }}"
    unit_of_measurement: "µg/m3"
  - name: "Salon wilgotność"
    icon: "mdi:water-percent"
    state_topic: "home/living-room/temp-dust-sensor"
    value_template: "{{ value_json.humidity | round(1) }}"
    unit_of_measurement: "%"
  - name: "Salon temperatura"
    state_topic: "home/living-room/temp-dust-sensor"
    value_template: "{{ value_json.temperature | round(1) }}"
    unit_of_measurement: "°C"
  - name: "Kuchnia wilgotność"
    icon: "mdi:water-percent"
    state_topic: "home/kitchen/temp-dust-sensor"
    value_template: "{{ value_json.humidity | round(1) }}"
    unit_of_measurement: "%"
  - name: "Kuchnia temperatura"
    state_topic: "home/kitchen/temp-dust-sensor"
    value_template: "{{ value_json.temperature | round(1) }}"
    unit_of_measurement: "°C"


# ==================== INVERTER SENSORS ====================
# QPIGS - Get Status command data
  - name: "Wejście AC - napięcie"
    object_id: "inverter.input_ac_voltage"
    state_topic: "inverters/easun_1"
    value_template: "{{ value_json.result.inputACVoltage | round(1) }}"
    unit_of_measurement: "V"
    icon: "mdi:electrical-plug"
  - name: "Wejście AC - częstotliwość"
    object_id: "inverter.grid_frequency"
    state_topic: "inverters/easun_1"
    value_template: "{{ value_json.result.gridFrequency | round(1) }}"
    unit_of_measurement: "Hz"
    icon: "mdi:sine-wave"
  - name: "Wyjście AC - napięcie"
    object_id: "inverter.ac_output_voltage"
    state_topic: "inverters/easun_1"
    value_template: "{{ value_json.result.acOutputVoltage | round(1) }}"
    unit_of_measurement: "V"
    icon: "mdi:flash"
  - name: "Wyjście AC - częstotliwość"
    object_id: "inverter.output_frequency"
    state_topic: "inverters/easun_1"
    value_template: "{{ value_json.result.outputFrequency | round(1) }}"
    unit_of_measurement: "Hz"
    icon: "mdi:sine-wave"
  - name: "Moc pozorna"
